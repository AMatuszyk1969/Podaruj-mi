{% extends "base.html" %}
{% block title %}Odzyskaj hasło – Podaruj mi{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto pt-4">

  <div class="flex items-center gap-3 mb-6">
    <a href="/login" class="text-gray-400 hover:text-brand-700">
      <svg width="24" height="24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M15 19l-7-7 7-7"/>
      </svg>
    </a>
    <h1 class="text-xl font-bold text-brand-700">Odzyskaj hasło</h1>
  </div>

  <p class="text-sm text-gray-500 mb-6">
    Podaj adres e-mail użyty podczas rejestracji. Wyślemy Ci link do ustawienia nowego hasła.
  </p>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-5">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/forgot-password" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">Adres e-mail</label>
      <input type="email" name="email" required autofocus
             placeholder="jan@przyklad.pl"
             value="{{ email or '' }}"
             class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500"/>
    </div>

    <button type="submit"
            class="w-full bg-brand-700 hover:bg-brand-600 text-white font-semibold py-3 rounded-xl shadow transition">
      Wyślij link resetujący
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Pamiętasz hasło? <a href="/login" class="text-brand-700 font-medium hover:underline">Zaloguj się</a>
  </p>

</div>
{% endblock %}
