{% extends "base.html" %}
{% block title %}Logowanie – Podaruj mi{% endblock %}
{% block content %}
<div class="max-w-sm mx-auto pt-6">
  <h1 class="text-2xl font-bold text-brand-700 mb-1">Witaj z powrotem 👋</h1>
  <p class="text-gray-400 text-sm mb-8">Zaloguj się do swojego konta</p>

  {% if error %}
  <div class="bg-red-50 border border-red-200 text-red-700 rounded-xl px-4 py-3 text-sm mb-5">
    {{ error }}
  </div>
  {% endif %}

  <form method="post" action="/login" class="flex flex-col gap-4">
    <div>
      <label class="block text-sm font-medium text-gray-700 mb-1">E-mail</label>
      <input type="email" name="email" required autocomplete="email"
             class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
             placeholder="twoj@email.pl"/>
    </div>
    <div>
      <div class="flex items-center justify-between mb-1">
        <label class="block text-sm font-medium text-gray-700">Hasło</label>
        <a href="/forgot-password" class="text-xs text-brand-700 hover:underline">Zapomniałem hasła</a>
      </div>
      <input type="password" name="password" required autocomplete="current-password"
             class="w-full border border-gray-300 rounded-xl px-4 py-3 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 focus:border-transparent"
             placeholder="••••••••"/>
    </div>
    <button type="submit"
            class="w-full bg-brand-700 hover:bg-brand-600 text-white font-semibold py-3 rounded-xl shadow transition mt-2">
      Zaloguj się
    </button>
  </form>

  <p class="text-center text-sm text-gray-400 mt-6">
    Nie masz konta?
    <a href="/register" class="text-brand-700 font-medium hover:underline">Zarejestruj się</a>
  </p>
</div>
{% endblock %}
