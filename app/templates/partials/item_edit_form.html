<!-- Partial: formularz edycji życzenia (inline, HTMX) -->
<div id="item-{{ item.id }}"
     class="bg-brand-50 rounded-xl border border-brand-200 p-4">
  <p class="text-sm font-semibold text-brand-700 mb-3">✏️ Edytuj życzenie</p>
  <form hx-post="/items/{{ item.id }}/edit"
        hx-target="#item-{{ item.id }}"
        hx-swap="outerHTML"
        class="flex flex-col gap-2">
    <input type="text" name="name" required value="{{ item.name }}"
           placeholder="Nazwa prezentu"
           class="w-full border border-brand-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
    <div class="grid grid-cols-2 gap-2">
      <input type="url" name="url" value="{{ item.url or '' }}"
             placeholder="Link do sklepu (opcja)"
             class="border border-brand-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
      <input type="number" name="estimated_price" value="{{ item.estimated_price or '' }}"
             placeholder="Cena zł" min="0" step="0.01"
             class="border border-brand-200 rounded-xl px-3 py-2.5 text-sm focus:outline-none focus:ring-2 focus:ring-brand-500 bg-white"/>
    </div>
    <div class="flex gap-2 mt-1">
      <button type="submit"
              class="flex-1 bg-brand-700 hover:bg-brand-600 text-white text-sm font-semibold py-2.5 rounded-xl shadow transition">
        Zapisz
      </button>
      <button type="button"
              hx-get="/items/{{ item.id }}/card"
              hx-target="#item-{{ item.id }}"
              hx-swap="outerHTML"
              class="bg-gray-100 hover:bg-gray-200 text-gray-600 text-sm font-semibold px-4 py-2.5 rounded-xl transition">
        Anuluj
      </button>
    </div>
  </form>
</div>
