<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <meta name="theme-color" content="#1A569E"/>
  <title>{% block title %}Podaruj mi{% endblock %}</title>
  <link rel="manifest" href="/static/manifest.json"/>
  <link rel="icon" href="/static/icon-192.png"/>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      theme: { extend: { colors: {
        brand: { 50:'#EDF3FB', 100:'#D6E8F8', 500:'#4AA3D4', 600:'#2E75B6', 700:'#1A569E', 900:'#0F3460' }
      }}}
    }
  </script>
  <script src="https://unpkg.com/htmx.org@2.0.3"></script>
  <style>
    [x-cloak] { display: none; }
    .htmx-indicator { opacity: 0; transition: opacity 200ms; }
    .htmx-request .htmx-indicator { opacity: 1; }
    .htmx-request.htmx-indicator { opacity: 1; }
  </style>
</head>
<body class="bg-gray-50 min-h-screen flex flex-col text-gray-800">

  <!-- Górny pasek nawigacji -->
  <header class="bg-brand-700 text-white shadow-md sticky top-0 z-50">
    <div class="max-w-lg mx-auto px-4 h-14 flex items-center justify-between">
      <a href="/" class="text-xl font-bold tracking-tight flex items-center gap-2">
        🎁 <span>Podaruj mi</span>
      </a>
      {% if user is defined and user %}
      <nav class="flex items-center gap-1">
        <a href="/occasions" class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition">Okazje</a>
        <a href="/social/friends" class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition">Znajomi</a>
        <a href="/social/family" class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition">Rodzina</a>
        <a href="/profile" class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition">Profil</a>
        <a href="/logout" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-brand-900 hover:bg-black/30 transition">Wyloguj</a>
      </nav>
      {% else %}
      <nav class="flex items-center gap-1">
        <a href="/login"    class="px-3 py-1.5 rounded-lg text-sm font-medium hover:bg-brand-600 transition">Zaloguj</a>
        <a href="/register" class="px-3 py-1.5 rounded-lg text-sm font-medium bg-white text-brand-700 hover:bg-brand-50 transition">Zarejestruj</a>
      </nav>
      {% endif %}
    </div>
  </header>

  <!-- Treść strony -->
  <main class="flex-1 max-w-lg mx-auto w-full px-4 py-6">
    {% block content %}{% endblock %}
  </main>

  <!-- Dolna nawigacja (tylko dla zalogowanych) -->
  {% if user is defined and user %}
  <nav class="fixed bottom-0 left-0 right-0 bg-white border-t border-gray-200 flex justify-around py-2 z-50 shadow-lg">
    <a href="/occasions" class="flex flex-col items-center gap-0.5 text-xs font-medium px-3 py-1
        {% if request.url.path == '/occasions' or request.url.path.startswith('/occasions/') %}text-brand-700{% else %}text-gray-500{% endif %}">
      <svg width="24" height="24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 12l2-2m0 0l7-7 7 7M5 10v10a1 1 0 001 1h3m10-11l2 2m-2-2v10a1 1 0 01-1 1h-3m-6 0a1 1 0 001-1v-4a1 1 0 011-1h2a1 1 0 011 1v4a1 1 0 001 1m-6 0h6"/>
      </svg>
      Okazje
    </a>
    <a href="/social/friends" class="flex flex-col items-center gap-0.5 text-xs font-medium px-3 py-1
        {% if request.url.path.startswith('/social') %}text-brand-700{% else %}text-gray-500{% endif %}">
      <svg width="24" height="24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M17 20h5v-2a3 3 0 00-5.356-1.857M17 20H7m10 0v-2c0-.656-.126-1.283-.356-1.857M7 20H2v-2a3 3 0 015.356-1.857M7 20v-2c0-.656.126-1.283.356-1.857m0 0a5.002 5.002 0 019.288 0M15 7a3 3 0 11-6 0 3 3 0 016 0z"/>
      </svg>
      Znajomi
    </a>
    <a href="/occasions/new" class="flex flex-col items-center gap-0.5 text-xs text-gray-500 font-medium px-3 py-1">
      <span class="w-10 h-10 rounded-full bg-brand-700 text-white flex items-center justify-center shadow-md -mt-5 text-2xl font-light">+</span>
      <span class="mt-1">Nowa</span>
    </a>
    <a href="/social/family" class="flex flex-col items-center gap-0.5 text-xs font-medium px-3 py-1
        {% if request.url.path == '/social/family' %}text-brand-700{% else %}text-gray-500{% endif %}">
      <svg width="24" height="24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/>
        <path stroke-linecap="round" stroke-linejoin="round" d="M9 22V12h6v10"/>
      </svg>
      Rodzina
    </a>
    <a href="/profile" class="flex flex-col items-center gap-0.5 text-xs font-medium px-3 py-1
        {% if request.url.path == '/profile' %}text-brand-700{% else %}text-gray-500{% endif %}">
      <svg width="24" height="24" class="w-6 h-6" fill="none" stroke="currentColor" stroke-width="2" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" d="M16 7a4 4 0 11-8 0 4 4 0 018 0zM12 14a7 7 0 00-7 7h14a7 7 0 00-7-7z"/>
      </svg>
      Profil
    </a>
  </nav>
  <div class="h-16"></div><!-- spacer for bottom nav -->
  {% endif %}

  <script>
    // Rejestracja Service Workera (PWA)
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/static/sw.js').catch(() => {});
    }

    // ── CSRF (Double Submit Cookie) ───────────────────────────────────────────
    (function () {
      function getCsrf() {
        var m = document.cookie.match(/(?:^|;\s*)pm_csrf=([^;]+)/);
        return m ? decodeURIComponent(m[1]) : '';
      }
      // HTMX: dodaj nagłówek X-CSRFToken do każdego żądania
      document.addEventListener('htmx:configRequest', function (e) {
        var t = getCsrf(); if (t) e.detail.headers['X-CSRFToken'] = t;
      });
      // Zwykłe formularze: wstrzyknij hidden field przed wysłaniem
      document.addEventListener('submit', function (e) {
        var f = e.target;
        if (f.enctype === 'multipart/form-data') return;
        if (!f.querySelector('[name="csrf_token"]')) {
          var i = document.createElement('input');
          i.type = 'hidden'; i.name = 'csrf_token'; i.value = getCsrf();
          f.appendChild(i);
        }
      }, true);
    })();
  </script>
</body>
</html>
